php_value[session.save_handler] = redis
php_value[session.save_path] = "tcp://redis:6379?weight=1"
php_value[memory_limit] = 254M
php_value[post_max_size] = 10M
php_value[upload_max_filesize] = 10M

php_admin_value[opcache.validate_timestamps] = 1
php_admin_value[opcache.revalidate_freq] = 2
php_admin_value[opcache.file_cache_consistency_checks] = 1
php_admin_value[opcache.interned_strings_buffer] = 16

; PHP-FPM Process Manager Configuration
; Tuned for 8 cores / 12GB RAM
; ~8GB available for PHP after OS + MySQL/Redis/Nginx overhead
; max_children = ~8192MB / ~150MB avg process = ~50
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 1
pm.max_spare_servers = 10
pm.max_requests = 500

